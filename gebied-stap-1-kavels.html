<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>POM – Gebied kavels</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link href="https://cdn.jsdelivr.net/npm/cesium@1.107/Build/Cesium/Widgets/widgets.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@geoman-io/leaflet-geoman-free@2/dist/leaflet-geoman.min.css"/>
  <style>
    #map, #map3d { height: 800px; border-radius: 0.75rem; }
    .tab-pill {
      width: 100%; padding: 0.55rem 1rem; border-radius: 99px;
      border: 1.5px solid #E5E7EB; background: white;
      color: #9CA3AF; font-size: 0.8rem; font-weight: 500;
      text-align: center; cursor: pointer; transition: all 0.15s;
    }
    .tab-pill.done    { border-color: #D1FAE5; background: #ECFDF5; color: #059669; }
    .tab-pill.pending { color: #D1D5DB; border-color: #F3F4F6; cursor: default; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 p-8 gebied">

  <div class="mx-auto">
    <a href="gebied-stap-1-locatie.html" class="text-xs text-gray-400 hover:text-violet-600">← Terug naar locatie</a>
    <h1 id="project-titel" class="page-title"></h1>
    <div id="step-indicator" class="mb-6"></div>

    <div class="flex gap-5">
      <div id="nav-panel" class="nav-panel"></div>

      <!-- PDF viewer + Map -->
      <div class="relative flex-1 flex gap-5">

        <!-- Kavelpaspoort PDF Viewer -->
        <div id="kavelpaspoort-panel" class="card p-4 flex flex-col gap-3"
             style="position:absolute;left:0;top:0;height:100%;z-index:1000;width:14rem;transition:width 0.2s;display:none;">
          <div class="flex items-center justify-between gap-2">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-widest flex-1">Kavelpaspoort</h3>
            <div class="flex items-center gap-1">
              <button onclick="pdfZoom(-1)" class="text-gray-400 hover:text-violet-600 text-xs px-1.5 py-0.5 rounded border border-gray-200 hover:border-violet-300 transition-colors">−</button>
              <button onclick="pdfZoom(1)"  class="text-gray-400 hover:text-violet-600 text-xs px-1.5 py-0.5 rounded border border-gray-200 hover:border-violet-300 transition-colors">+</button>
              <button id="pdf-expand-btn" onclick="togglePdfExpand()" class="text-gray-400 hover:text-violet-600 text-xs px-1.5 py-0.5 rounded border border-gray-200 hover:border-violet-300 transition-colors">⇔</button>
            </div>
          </div>
          <div class="flex-1 rounded-lg overflow-hidden bg-gray-200" style="min-height:380px;">
            <iframe id="pdf-frame" src="" style="display:none;width:100%;height:100%;border:none;border-radius:8px;"></iframe>
          </div>
        </div>

        <!-- Map -->
        <div class="flex-1">
          <div class="flex justify-end mb-2">
            <div class="inline-flex rounded-lg border border-gray-200 bg-white p-0.5">
              <button id="btn-2d" onclick="setMapMode('2d')" class="px-3 py-1 text-xs rounded-md bg-violet-600 text-white">2D</button>
              <button id="btn-3d" onclick="setMapMode('3d')" class="px-3 py-1 text-xs rounded-md text-gray-500">3D</button>
            </div>
          </div>
          <div id="map"></div>
          <div id="map3d" class="hidden"></div>
          <p id="map-hint" class="text-xs text-gray-400 mt-2 text-center">
            Druk op "Selecteer kavel(s)" om kavels toe te voegen
          </p>
        </div>

      </div><!-- end pdf+map wrapper -->

      <!-- Right panel: sequential cards -->
      <div class="w-52 flex-shrink-0 flex flex-col gap-3">
        <div id="cards-container" class="flex flex-col gap-2"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>window.CESIUM_BASE_URL = 'https://cdn.jsdelivr.net/npm/cesium@1.107/Build/Cesium/';</script>
  <script src="https://cdn.jsdelivr.net/npm/cesium@1.107/Build/Cesium/Cesium.js"></script>
  <script src="js/cesium-maplibre-shim.js?v=20261031"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@geoman-io/leaflet-geoman-free@2/dist/leaflet-geoman.min.js"></script>
  <script src="js/state.js"></script>
  <script>
    const project = getCurrentProject();
    if (!project) { window.location.href = 'index.html'; }

    document.getElementById('project-titel').textContent = project.naam;
    document.getElementById('step-indicator').innerHTML  = renderStepIndicator(1, 5, ['gebied-stap-1-locatie.html']);
    document.getElementById('nav-panel').innerHTML       = renderNavPanel('gebied', project);

    const variantNr    = (project.gebiedVarianten || []).length + 1;
    const variantLabel = 'Gebiedsvariant ' + variantNr;

    // ── Cards ─────────────────────────────────────────────────────────────────
    const CARDS = [
      { key: 'kavelpaspoort', label: 'Kavelpaspoort' },
      { key: 'omgevingMassa', label: 'Omgeving massa' },
      { key: 'kavels',        label: 'Kavels' },
      { key: 'tekenen',       label: 'Teken plot' },
    ];
    let activeCard = 'kavelpaspoort';
    const completedCards = new Set();

    // ── Upload state ──────────────────────────────────────────────────────────
    let pendingKavelpaspoort = { blobUrl: null, fileName: null, dataUrl: null };
    let pendingOmgevingMassa = { blobUrl: null, fileName: null, dataUrl: null };

    // ── PDF viewer ────────────────────────────────────────────────────────────
    const PDF_ZOOMS = [50, 75, 100, 125, 150, 175, 200];
    let pdfZoomIdx  = 0;
    let pdfExpanded = false;

    function pdfSrc() {
      const url = pendingKavelpaspoort.blobUrl;
      if (!url) return '';
      return url + '#toolbar=0&navpanes=0&zoom=' + PDF_ZOOMS[pdfZoomIdx];
    }

    function loadKavelpaspoortPdf() {
      const panel = document.getElementById('kavelpaspoort-panel');
      const frame = document.getElementById('pdf-frame');
      if (pendingKavelpaspoort.blobUrl) {
        panel.style.display = '';
        frame.src = pdfSrc();
        frame.style.display = 'block';
      } else {
        panel.style.display = 'none';
        frame.src = '';
        frame.style.display = 'none';
      }
    }

    function pdfZoom(dir) {
      pdfZoomIdx = Math.max(0, Math.min(PDF_ZOOMS.length - 1, pdfZoomIdx + dir));
      const frame = document.getElementById('pdf-frame');
      if (frame && frame.style.display !== 'none') { frame.src = ''; frame.src = pdfSrc(); }
    }
    window.pdfZoom = pdfZoom;

    function togglePdfExpand() {
      pdfExpanded = !pdfExpanded;
      const panel = document.getElementById('kavelpaspoort-panel');
      const btn   = document.getElementById('pdf-expand-btn');
      panel.style.width = pdfExpanded ? '48%' : '14rem';
      btn.textContent   = pdfExpanded ? '⇤' : '⇔';
      setTimeout(() => {
        const frame = document.getElementById('pdf-frame');
        if (frame && frame.style.display !== 'none') { frame.src = ''; frame.src = pdfSrc(); }
      }, 220);
    }
    window.togglePdfExpand = togglePdfExpand;

    // ── File upload ───────────────────────────────────────────────────────────
    function handleUpload(event, key) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      if (key === 'kavelpaspoort') {
        if (pendingKavelpaspoort.blobUrl) URL.revokeObjectURL(pendingKavelpaspoort.blobUrl);
        pendingKavelpaspoort.blobUrl  = URL.createObjectURL(file);
        pendingKavelpaspoort.fileName = file.name;
        loadKavelpaspoortPdf();
        reader.onload = e => { pendingKavelpaspoort.dataUrl = e.target.result; };
        reader.readAsDataURL(file);
      } else {
        if (pendingOmgevingMassa.blobUrl) URL.revokeObjectURL(pendingOmgevingMassa.blobUrl);
        pendingOmgevingMassa.blobUrl  = URL.createObjectURL(file);
        pendingOmgevingMassa.fileName = file.name;
        reader.onload = e => { pendingOmgevingMassa.dataUrl = e.target.result; };
        reader.readAsDataURL(file);
      }
      renderCards();
    }
    window.handleUpload = handleUpload;

    // ── Kavels state ──────────────────────────────────────────────────────────
    let selectedKavels   = [];
    let nextKavelId      = 1;
    let selecterenActief = false;
    let isLoading        = false;
    let editingKavelId   = null;

    // ── Drawing state ─────────────────────────────────────────────────────────
    let drawPoints       = [];
    let drawPoly         = null;
    let plotGeo          = null;
    let plotOpp          = 0;
    let tekenActief      = false;
    let rubberbandLine   = null;
    let firstPointCircle = null;

    // ── Map init ──────────────────────────────────────────────────────────────
    const MAP_VIEW_KEY = 'pom_map_view_gebied_' + project.id;
    const savedView    = JSON.parse(localStorage.getItem(MAP_VIEW_KEY) || 'null');
    const map = L.map('map').setView(
      savedView ? [savedView.lat, savedView.lng] : [52.2, 5.3],
      savedView ? savedView.zoom : 8
    );
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19
    }).addTo(map);
    map.on('moveend', () => {
      const c = map.getCenter();
      localStorage.setItem(MAP_VIEW_KEY, JSON.stringify({ lat: c.lat, lng: c.lng, zoom: map.getZoom() }));
    });

    const map3d = new maplibregl.Map({
      container: 'map3d',
      style: {
        version: 8,
        sources: { osm: { type: 'raster', tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize: 256, attribution: '© OpenStreetMap contributors' } },
        layers:  [{ id: 'osm', type: 'raster', source: 'osm' }]
      },
      center:  [map.getCenter().lng, map.getCenter().lat],
      zoom:    map.getZoom(),
      pitch:   55,
      bearing: -15
    });

    function setMapMode(mode) {
      const map2dEl = document.getElementById('map');
      const map3dEl = document.getElementById('map3d');
      const btn2d   = document.getElementById('btn-2d');
      const btn3d   = document.getElementById('btn-3d');
      if (mode === '3d') {
        const c = map.getCenter();
        map3d.setCenter([c.lng, c.lat]);
        map3d.setZoom(map.getZoom());
        map3dEl.style.width = map2dEl.offsetWidth + 'px';
        map2dEl.classList.add('hidden');
        map3dEl.classList.remove('hidden');
        btn2d.className = 'px-3 py-1 text-xs rounded-md text-gray-500';
        btn3d.className = 'px-3 py-1 text-xs rounded-md bg-violet-600 text-white';
        map3d.resize();
        syncLeafletTo3D();
      } else {
        const c = map3d.getCenter();
        map.setView([c.lat, c.lng], map3d.getZoom());
        map3dEl.classList.add('hidden');
        map2dEl.classList.remove('hidden');
        btn2d.className = 'px-3 py-1 text-xs rounded-md bg-violet-600 text-white';
        btn3d.className = 'px-3 py-1 text-xs rounded-md text-gray-500';
        map.invalidateSize();
      }
    }
    window.setMapMode = setMapMode;

    let map3dReady = false;
    const sync3dSourceId = 'leaflet-polygons-src';
    function syncLeafletTo3D() {
      if (!map3dReady) return;
      const features = [];
      map.eachLayer(layer => {
        if (layer instanceof L.Polygon) {
          const gj = layer.toGeoJSON();
          if (gj && gj.geometry) {
            gj.properties = {
              fillColor:   layer.options?.fillColor   || layer.options?.color || '#7C3AED',
              lineColor:   layer.options?.color       || '#4C1D95',
              fillOpacity: layer.options?.fillOpacity ?? 0.22,
              lineWidth:   layer.options?.weight      ?? 1.5,
            };
            features.push(gj);
          }
        }
      });
      const fc  = { type: 'FeatureCollection', features };
      const src = map3d.getSource(sync3dSourceId);
      if (src) {
        src.setData(fc);
      } else {
        map3d.addSource(sync3dSourceId, { type: 'geojson', data: fc });
        map3d.addLayer({ id: 'leaflet-polygons-fill', type: 'fill', source: sync3dSourceId,
          paint: { 'fill-color': ['coalesce', ['get', 'fillColor'], '#7C3AED'], 'fill-opacity': ['coalesce', ['get', 'fillOpacity'], 0.22] } });
        map3d.addLayer({ id: 'leaflet-polygons-line', type: 'line', source: sync3dSourceId,
          paint: { 'line-color': ['coalesce', ['get', 'lineColor'], '#4C1D95'], 'line-width': ['coalesce', ['get', 'lineWidth'], 1.5] } });
      }
    }
    map3d.on('load', () => { map3dReady = true; syncLeafletTo3D(); });
    map.on('layeradd',    syncLeafletTo3D);
    map.on('layerremove', syncLeafletTo3D);

    // ── Kadaster WMS overlay ──────────────────────────────────────────────────
    const kadasterLayer = L.tileLayer.wms(
      'https://service.pdok.nl/kadaster/kadastralekaart/wms/v5_0',
      { layers: 'Perceel', format: 'image/png', transparent: true, opacity: 0.6, attribution: '© Kadaster' }
    ).addTo(map);

    // ── Helpers ───────────────────────────────────────────────────────────────
    function calcAreaM2(latlngs) {
      if (!latlngs || latlngs.length < 3) return 0;
      let area = 0;
      const n = latlngs.length;
      for (let i = 0; i < n; i++) {
        const j = (i + 1) % n;
        area += latlngs[i].lat * latlngs[j].lng;
        area -= latlngs[j].lat * latlngs[i].lng;
      }
      const DEG_TO_M = 111320;
      return Math.round(Math.abs(area / 2) * DEG_TO_M * DEG_TO_M * Math.cos(52 * Math.PI / 180));
    }

    function calcMinGrondvlak(pveVariant) {
      const rs = pveVariant && pveVariant.ruimtestaat;
      if (!rs) return null;
      const clusters = rs.clusters || [];
      if (!clusters.length) return null;
      return Math.round(clusters
        .filter(c => c.verdiepingrestrictie)
        .reduce((sum, c) => sum + c.rooms.reduce(
          (s, r) => s + parseFloat(r.aantal) * parseFloat(r.oppervlakte), 0), 0));
    }

    function renderPveCompatRows(containerId, listId, totalOpp) {
      const container    = document.getElementById(containerId);
      const listEl       = document.getElementById(listId);
      if (!container || !listEl) return;
      const pveVarianten = project.pveVarianten || [];
      if (pveVarianten.length === 0) { container.classList.add('hidden'); return; }
      container.classList.remove('hidden');
      listEl.innerHTML = pveVarianten.map(pv => {
        const minOpp = calcMinGrondvlak(pv);
        if (minOpp === null || minOpp === 0) {
          return `<div class="flex items-center justify-between gap-1 text-xs">
            <span class="truncate flex-1" style="color:#F97316" title="${pv.naam}">${pv.naam}</span>
            <span class="flex-shrink-0" style="color:#D1D5DB">geen ruimtestaat</span>
          </div>`;
        }
        const ok = totalOpp > 0 && totalOpp >= minOpp;
        return `<div class="flex items-center justify-between gap-1 text-xs">
          <span class="truncate flex-1" style="${ok ? 'color:#059669' : 'color:#F97316'}" title="${pv.naam}">${pv.naam}</span>
          <span class="flex-shrink-0" style="${ok ? 'color:#059669' : 'color:#F97316'}">${minOpp.toLocaleString('nl-NL')} m²</span>
          <span class="flex-shrink-0 font-semibold" style="${ok ? 'color:#059669' : 'color:#F97316'}">${ok ? '✓' : '✗'}</span>
        </div>`;
      }).join('');
    }

    // ── Kavel selection ───────────────────────────────────────────────────────
    function toggleSelecteren() {
      if (editingKavelId !== null) stopEditKavel(editingKavelId);
      selecterenActief = !selecterenActief;
      const btn = document.getElementById('selecteer-btn');
      if (!btn) return;
      if (selecterenActief) {
        btn.textContent = '✕ Stoppen met selecteren';
        btn.className   = 'w-full text-xs font-medium py-1.5 px-3 rounded-lg border border-red-300 text-red-500 hover:bg-red-50 transition-all';
        map.getContainer().style.cursor = 'crosshair';
        document.getElementById('map-hint').textContent = 'Klik op de kaart om kavels toe te voegen';
      } else {
        btn.textContent = 'Selecteer kavel(s)';
        btn.className   = 'w-full text-xs font-medium py-1.5 px-3 rounded-lg border border-violet-300 text-violet-600 hover:bg-violet-50 transition-all';
        map.getContainer().style.cursor = '';
        document.getElementById('map-hint').textContent = 'Druk op "Selecteer kavel(s)" om kavels toe te voegen';
      }
    }
    window.toggleSelecteren = toggleSelecteren;

    function pointInGeoJsonPolygon(lat, lng, coords) {
      const ring = coords[0];
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0], yi = ring[i][1];
        const xj = ring[j][0], yj = ring[j][1];
        if (((yi > lat) !== (yj > lat)) && (lng < (xj - xi) * (lat - yi) / (yj - yi) + xi))
          inside = !inside;
      }
      return inside;
    }

    async function addKavel(latlng) {
      if (isLoading) return;
      isLoading = true;
      map.getContainer().style.cursor = 'wait';
      const hint = document.getElementById('map-hint');
      hint.textContent = 'Kavel ophalen…';
      const { lat, lng } = latlng;
      const margin = 0.001;
      const url = `https://service.pdok.nl/kadaster/kadastralekaart/wfs/v5_0?service=WFS&version=2.0.0&request=GetFeature&typeName=kadastralekaart:Perceel&outputFormat=application/json&srsName=EPSG:4326&bbox=${lat - margin},${lng - margin},${lat + margin},${lng + margin},EPSG:4326&count=20`;
      try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('WFS mislukt');
        const data     = await resp.json();
        const features = data.features || [];
        let found = null;
        for (const feat of features) {
          const geom = feat.geometry;
          if (!geom) continue;
          if (geom.type === 'Polygon') {
            if (pointInGeoJsonPolygon(lat, lng, geom.coordinates)) { found = feat; break; }
          } else if (geom.type === 'MultiPolygon') {
            for (const poly of geom.coordinates) {
              if (pointInGeoJsonPolygon(lat, lng, poly)) { found = feat; break; }
            }
            if (found) break;
          }
        }
        if (!found) { hint.textContent = 'Geen kavel gevonden op deze locatie'; return; }
        const featureId = found.id || found.properties.identificatie || '';
        if (selectedKavels.some(k => k.featureId === featureId)) {
          hint.textContent = 'Deze kavel is al geselecteerd'; return;
        }
        const geom = found.geometry;
        let leafletRings;
        if (geom.type === 'Polygon') {
          leafletRings = geom.coordinates.map(ring => ring.map(c => [c[1], c[0]]));
        } else {
          leafletRings = geom.coordinates[0].map(ring => ring.map(c => [c[1], c[0]]));
        }
        const geo   = leafletRings[0];
        const props = found.properties || {};
        const kadastraleAanduiding = props.kadastraleAanduiding
          || (props.kadastraleGemeenteCode && props.sectie && props.perceelnummer
              ? `${props.kadastraleGemeenteCode} ${props.sectie} ${props.perceelnummer}` : null);
        const opp  = props.oppervlakte
          ? Math.round(props.oppervlakte)
          : calcAreaM2(geo.map(c => ({ lat: c[0], lng: c[1] })));
        const poly = L.polygon(leafletRings, { color: '#7C3AED', fillColor: '#7C3AED', fillOpacity: 0.25, weight: 2 }).addTo(map);
        selectedKavels.push({ id: nextKavelId++, featureId, kadastraleAanduiding, geo, opp, poly });
        renderKavelsList();
      } catch (err) {
        console.error(err);
        hint.textContent = 'Fout bij ophalen kavel, probeer opnieuw';
      } finally {
        isLoading = false;
        map.getContainer().style.cursor = selecterenActief ? 'crosshair' : '';
        if (selecterenActief && document.getElementById('map-hint').textContent === 'Kavel ophalen…')
          hint.textContent = 'Klik op de kaart om kavels toe te voegen';
      }
    }

    function removeKavel(id) {
      if (editingKavelId === id) {
        const kavel = selectedKavels.find(k => k.id === id);
        if (kavel) kavel.poly.pm.disable();
        editingKavelId = null;
      }
      const idx = selectedKavels.findIndex(k => k.id === id);
      if (idx === -1) return;
      map.removeLayer(selectedKavels[idx].poly);
      selectedKavels.splice(idx, 1);
      renderKavelsList();
    }
    window.removeKavel = removeKavel;

    function startEditKavel(id) {
      if (editingKavelId !== null) stopEditKavel(editingKavelId);
      const kavel = selectedKavels.find(k => k.id === id);
      if (!kavel || !(kavel.poly instanceof L.Polygon)) return;
      editingKavelId = id;
      kavel.poly.pm.enable({ allowSelfIntersection: false });
      document.getElementById('map-hint').textContent = 'Sleep hoekpunten om het polygon aan te passen. Klik ✓ om op te slaan.';
      renderKavelsList();
    }
    window.startEditKavel = startEditKavel;

    function stopEditKavel(id) {
      const kavel = selectedKavels.find(k => k.id === id);
      if (!kavel) { editingKavelId = null; return; }
      kavel.poly.pm.disable();
      const latlngs = kavel.poly.getLatLngs()[0];
      kavel.geo = latlngs.map(ll => [ll.lat, ll.lng]);
      kavel.opp = calcAreaM2(latlngs);
      editingKavelId = null;
      document.getElementById('map-hint').textContent = 'Druk op "Selecteer kavel(s)" om kavels toe te voegen';
      renderKavelsList();
    }
    window.stopEditKavel = stopEditKavel;

    function mergeKavels() {
      if (selectedKavels.length < 2) return;
      if (editingKavelId !== null) stopEditKavel(editingKavelId);
      const turfFeatures = selectedKavels.map(k => {
        const ring = k.geo.map(c => [c[1], c[0]]);
        ring.push(ring[0]);
        return turf.polygon([ring]);
      });
      const unionResult = turf.union(turf.featureCollection(turfFeatures));
      if (!unionResult) return;
      selectedKavels.forEach(k => map.removeLayer(k.poly));
      const polyStyle = { color: '#7C3AED', fillColor: '#7C3AED', fillOpacity: 0.25, weight: 2 };
      let mergedPoly, mergedGeo;
      if (unionResult.geometry.type === 'Polygon') {
        const leafletRings = unionResult.geometry.coordinates.map(ring => ring.map(c => [c[1], c[0]]));
        mergedPoly = L.polygon(leafletRings, polyStyle).addTo(map);
        mergedGeo  = leafletRings[0];
      } else {
        const group = L.featureGroup().addTo(map);
        unionResult.geometry.coordinates.forEach(poly => {
          L.polygon(poly.map(ring => ring.map(c => [c[1], c[0]])), polyStyle).addTo(group);
        });
        mergedPoly = group;
        mergedGeo  = unionResult.geometry.coordinates[0][0].map(c => [c[1], c[0]]);
      }
      const totalOpp = selectedKavels.reduce((s, k) => s + k.opp, 0);
      selectedKavels = [{ id: nextKavelId++, featureId: 'merged', kadastraleAanduiding: 'Samengevoegd gebied', geo: mergedGeo, opp: totalOpp, poly: mergedPoly }];
      renderKavelsList();
    }
    window.mergeKavels = mergeKavels;

    function renderKavelsList() {
      const list     = document.getElementById('kavels-list');
      const empty    = document.getElementById('kavels-empty');
      const mergeBtn = document.getElementById('merge-btn');
      const oppDisp  = document.getElementById('opp-display');
      const volgBtn  = document.getElementById('kavels-volgende-btn');
      if (!list) return;
      list.innerHTML = '';
      if (selectedKavels.length === 0) {
        if (empty)    empty.classList.remove('hidden');
        if (mergeBtn) mergeBtn.classList.add('hidden');
        if (oppDisp)  oppDisp.textContent = '— m²';
        if (volgBtn)  volgBtn.disabled = true;
        renderPveCompatRows('kavels-pve-compat-container', 'kavels-pve-compat-list', 0);
        return;
      }
      if (empty)    empty.classList.add('hidden');
      if (mergeBtn) mergeBtn.classList.toggle('hidden', selectedKavels.length < 2 || editingKavelId !== null);
      selectedKavels.forEach((k, i) => {
        const row     = document.createElement('div');
        row.className = 'flex items-center gap-1 text-xs';
        const label   = k.kadastraleAanduiding || 'Kavel ' + (i + 1);
        const isEdit  = editingKavelId === k.id;
        const canEdit = k.poly instanceof L.Polygon;
        row.innerHTML = `
          <span class="text-gray-600 truncate flex-1" title="${label}">${label}</span>
          <span class="text-gray-400 flex-shrink-0">${k.opp.toLocaleString('nl-NL')} m²</span>
          ${canEdit ? `<button onclick="${isEdit ? 'stopEditKavel' : 'startEditKavel'}(${k.id})"
            class="flex-shrink-0 leading-none transition-colors ${isEdit ? 'text-violet-500 hover:text-violet-700' : 'text-gray-300 hover:text-violet-400'}"
            title="${isEdit ? 'Opslaan' : 'Bewerken'}">${isEdit ? '✓' : '✎'}</button>` : ''}
          <button onclick="removeKavel(${k.id})" class="text-gray-300 hover:text-red-400 transition-colors leading-none flex-shrink-0" title="Verwijderen">×</button>`;
        list.appendChild(row);
      });
      const totalOpp = selectedKavels.reduce((s, k) => s + k.opp, 0);
      if (oppDisp) oppDisp.textContent = totalOpp.toLocaleString('nl-NL') + ' m²';
      if (volgBtn) volgBtn.disabled = false;
      renderPveCompatRows('kavels-pve-compat-container', 'kavels-pve-compat-list', totalOpp);
    }

    // ── Drawing ───────────────────────────────────────────────────────────────
    function toggleTekenen() {
      if (tekenActief) return;
      tekenActief = true;
      const btn = document.getElementById('teken-btn');
      if (btn) {
        btn.disabled  = true;
        btn.className = 'w-full text-xs font-medium py-1.5 px-3 rounded-lg border border-gray-200 text-gray-300 cursor-default';
      }
      map.getContainer().style.cursor = 'crosshair';
      document.getElementById('map-hint').textContent = 'Klik om punten te plaatsen op de kaart';
    }
    window.toggleTekenen = toggleTekenen;

    function clearTekening() {
      if (rubberbandLine)   { map.removeLayer(rubberbandLine);   rubberbandLine   = null; }
      if (firstPointCircle) { map.removeLayer(firstPointCircle); firstPointCircle = null; }
      if (drawPoly) { map.removeLayer(drawPoly); drawPoly = null; }
      drawPoints = []; plotGeo = null; plotOpp = 0; tekenActief = false;
      map.getContainer().style.cursor = '';
      document.getElementById('map-hint').textContent = 'Druk op "Teken gebied" om te beginnen';
      renderCards();
    }
    window.clearTekening = clearTekening;

    function updateDrawDisplay() {
      const opp      = plotOpp || (drawPoly ? calcAreaM2(drawPoly.getLatLngs()[0]) : 0);
      const oppEl    = document.getElementById('draw-opp-display');
      const clearBtn = document.getElementById('draw-clear-btn');
      const volgBtn  = document.getElementById('tekenen-volgende-btn');
      if (oppEl)    oppEl.textContent = opp > 0 ? opp.toLocaleString('nl-NL') + ' m²' : '— m²';
      if (clearBtn) clearBtn.classList.toggle('hidden', !drawPoly && !plotGeo);
      if (volgBtn)  volgBtn.disabled = !drawPoly && !plotGeo;
      if (opp > 0)  renderPveCompatRows('draw-pve-compat-container', 'draw-pve-compat-list', opp);
    }

    // ── Map click ─────────────────────────────────────────────────────────────
    map.on('click', e => {
      // Kavels mode
      if (activeCard === 'kavels' && selecterenActief && !isLoading && editingKavelId === null) {
        addKavel(e.latlng);
        return;
      }
      // Drawing mode
      if (activeCard === 'tekenen' && tekenActief && !plotGeo) {
        if (drawPoints.length >= 3) {
          const firstPx = map.latLngToContainerPoint([drawPoints[0][0], drawPoints[0][1]]);
          const clickPx = map.latLngToContainerPoint(e.latlng);
          if (Math.hypot(firstPx.x - clickPx.x, firstPx.y - clickPx.y) < 15) {
            // Snap-to-close: finalize polygon
            if (rubberbandLine)   { map.removeLayer(rubberbandLine);   rubberbandLine   = null; }
            if (firstPointCircle) { map.removeLayer(firstPointCircle); firstPointCircle = null; }
            tekenActief = false;
            map.getContainer().style.cursor = '';
            plotGeo = drawPoly.getLatLngs()[0].map(p => [p.lat, p.lng]);
            plotOpp = calcAreaM2(drawPoly.getLatLngs()[0]);
            document.getElementById('map-hint').textContent = 'Gebied getekend — klik Volgende stap om verder te gaan';
            updateDrawDisplay();
            return;
          }
        }
        drawPoints.push([e.latlng.lat, e.latlng.lng]);
        if (drawPoints.length === 1) {
          firstPointCircle = L.circleMarker([drawPoints[0][0], drawPoints[0][1]], {
            radius: 5, color: '#7C3AED', fillColor: '#7C3AED', fillOpacity: 1, weight: 2, interactive: false
          }).addTo(map);
        }
        if (drawPoints.length >= 3) {
          if (drawPoly) map.removeLayer(drawPoly);
          drawPoly = L.polygon(drawPoints, { color: '#7C3AED', fillColor: '#7C3AED', fillOpacity: 0.25, weight: 2 }).addTo(map);
          updateDrawDisplay();
        }
      }
    });

    // ── Rubber-band preview line ──────────────────────────────────────────────
    map.on('mousemove', e => {
      if (activeCard !== 'tekenen' || !tekenActief || plotGeo || drawPoints.length === 0) return;
      let target   = e.latlng;
      let snapping = false;
      if (drawPoints.length >= 3) {
        const firstPx = map.latLngToContainerPoint([drawPoints[0][0], drawPoints[0][1]]);
        const curPx   = map.latLngToContainerPoint(e.latlng);
        if (Math.hypot(firstPx.x - curPx.x, firstPx.y - curPx.y) < 15) {
          target = L.latLng(drawPoints[0][0], drawPoints[0][1]);
          snapping = true;
        }
      }
      const from = [drawPoints[drawPoints.length - 1][0], drawPoints[drawPoints.length - 1][1]];
      if (!rubberbandLine) {
        rubberbandLine = L.polyline([from, [target.lat, target.lng]], {
          color: '#7C3AED', weight: 1.5, dashArray: '6 4', opacity: 0.7, interactive: false
        }).addTo(map);
      } else {
        rubberbandLine.setLatLngs([from, [target.lat, target.lng]]);
      }
      if (firstPointCircle) {
        firstPointCircle.setStyle({
          color:     snapping ? '#10B981' : '#7C3AED',
          fillColor: snapping ? '#10B981' : '#7C3AED',
        });
      }
    });

    // ── Card transitions ──────────────────────────────────────────────────────
    function goToCard(key) {
      const prev = activeCard;
      activeCard = key;
      // Stop kavel selection mode when leaving kavels
      if (prev === 'kavels' && selecterenActief) {
        selecterenActief = false;
        map.getContainer().style.cursor = '';
      }
      // When entering tekenen: restyle kavels as orange dashed underlay
      if (key === 'tekenen') {
        selectedKavels.forEach(k => {
          if (k.poly && k.poly.setStyle) {
            k.poly.setStyle({ color: '#F97316', fillColor: '#F97316', fillOpacity: 0.1, weight: 1.5, dashArray: '6 4' });
          }
        });
      }
      // When going back to kavels: restore violet style
      if (key === 'kavels' && prev === 'tekenen') {
        selectedKavels.forEach(k => {
          if (k.poly && k.poly.setStyle) {
            k.poly.setStyle({ color: '#7C3AED', fillColor: '#7C3AED', fillOpacity: 0.25, weight: 2, dashArray: '' });
          }
        });
      }
      renderCards();
    }

    // ── Navigation ────────────────────────────────────────────────────────────
    function naarOmgevingMassa() { completedCards.add('kavelpaspoort'); goToCard('omgevingMassa'); }
    function naarKavels()        { completedCards.add('omgevingMassa'); goToCard('kavels'); }
    function naarTekenen() {
      if (selectedKavels.length === 0) return;
      completedCards.add('kavels');
      goToCard('tekenen');
    }
    function overslaanKavels() {
      completedCards.add('kavels');
      goToCard('tekenen');
    }
    window.overslaanKavels = overslaanKavels;
    function naarStap2() {
      if (!plotGeo && !drawPoly) return;
      if (!plotGeo && drawPoly) {
        plotGeo = drawPoly.getLatLngs()[0].map(p => [p.lat, p.lng]);
        plotOpp = calcAreaM2(drawPoly.getLatLngs()[0]);
      }
      const variant = createNewGebiedVariant(variantLabel);
      const updates = {
        stedenbouwbeleid: { mode: 'simpel', goedgekeurd: false },
        geo: plotGeo, opp: plotOpp,
        bouwbaarGebied: { geo: plotGeo, opp: plotOpp },
      };
      if (pendingKavelpaspoort.blobUrl) {
        updates.kavelpaspoort         = true;
        updates.kavelpaspoortFileName = pendingKavelpaspoort.fileName;
        if (pendingKavelpaspoort.dataUrl) updates.kavelpaspoortDataUrl = pendingKavelpaspoort.dataUrl;
      }
      if (pendingOmgevingMassa.blobUrl) {
        updates.omgevingMassa         = true;
        updates.omgevingMassaFileName = pendingOmgevingMassa.fileName;
        if (pendingOmgevingMassa.dataUrl) updates.omgevingMassaDataUrl = pendingOmgevingMassa.dataUrl;
      }
      updateGebiedVariantById(variant.id, updates);
      window.location.href = 'gebied-stap-2-stedenbouw.html?id=' + variant.id;
    }
    function overslaanTekenen() {
      const variant = createNewGebiedVariant(variantLabel);
      const updates = {
        stedenbouwbeleid: { mode: 'simpel', goedgekeurd: false },
        geo: [], opp: 0,
        bouwbaarGebied: { geo: [], opp: 0 },
      };
      if (pendingKavelpaspoort.blobUrl) {
        updates.kavelpaspoort         = true;
        updates.kavelpaspoortFileName = pendingKavelpaspoort.fileName;
        if (pendingKavelpaspoort.dataUrl) updates.kavelpaspoortDataUrl = pendingKavelpaspoort.dataUrl;
      }
      if (pendingOmgevingMassa.blobUrl) {
        updates.omgevingMassa         = true;
        updates.omgevingMassaFileName = pendingOmgevingMassa.fileName;
        if (pendingOmgevingMassa.dataUrl) updates.omgevingMassaDataUrl = pendingOmgevingMassa.dataUrl;
      }
      updateGebiedVariantById(variant.id, updates);
      window.location.href = 'gebied-stap-2-stedenbouw.html?id=' + variant.id;
    }
    window.naarOmgevingMassa  = naarOmgevingMassa;
    window.naarKavels         = naarKavels;
    window.naarTekenen        = naarTekenen;
    window.naarStap2          = naarStap2;
    window.overslaanTekenen   = overslaanTekenen;

    // ── Card HTML builders ────────────────────────────────────────────────────
    function getCardInnerHTML(key) {
      switch (key) {
        case 'kavelpaspoort':
          return `
            <div class="text-sm font-semibold text-gray-700">${variantLabel}</div>
            <div class="flex flex-col gap-1">
              <label class="text-xs text-gray-500">Kavelpaspoort (PDF)</label>
              <label class="flex items-center justify-center gap-2 cursor-pointer border border-dashed border-violet-300 rounded-lg py-3 px-2 text-xs text-violet-500 hover:bg-violet-50 transition-colors">
                <span>📄</span>
                <span>${pendingKavelpaspoort.fileName || 'Kies bestand…'}</span>
                <input type="file" accept=".pdf" class="hidden" onchange="handleUpload(event,'kavelpaspoort')"/>
              </label>
              ${pendingKavelpaspoort.fileName ? `<p class="text-xs text-emerald-600 truncate" title="${pendingKavelpaspoort.fileName}">✓ ${pendingKavelpaspoort.fileName}</p>` : ''}
            </div>
            <button onclick="naarOmgevingMassa()" class="btn-secondary w-full">Overslaan</button>
            <button onclick="naarOmgevingMassa()" class="btn-primary w-full">Volgende →</button>`;

        case 'omgevingMassa':
          return `
            <div class="flex flex-col gap-1">
              <label class="text-xs text-gray-500">Omgeving massa (PDF)</label>
              <label class="flex items-center justify-center gap-2 cursor-pointer border border-dashed border-violet-300 rounded-lg py-3 px-2 text-xs text-violet-500 hover:bg-violet-50 transition-colors">
                <span>📄</span>
                <span>${pendingOmgevingMassa.fileName || 'Kies bestand…'}</span>
                <input type="file" accept=".pdf" class="hidden" onchange="handleUpload(event,'omgevingMassa')"/>
              </label>
              ${pendingOmgevingMassa.fileName ? `<p class="text-xs text-emerald-600 truncate" title="${pendingOmgevingMassa.fileName}">✓ ${pendingOmgevingMassa.fileName}</p>` : ''}
            </div>
            <button onclick="naarKavels()" class="btn-secondary w-full">Overslaan</button>
            <button onclick="naarKavels()" class="btn-primary w-full">Volgende →</button>`;

        case 'kavels':
          return `
            <button id="selecteer-btn" onclick="toggleSelecteren()"
                class="w-full text-xs font-medium py-1.5 px-3 rounded-lg border border-violet-300 text-violet-600 hover:bg-violet-50 transition-all">
              Selecteer kavel(s)
            </button>
            <button id="merge-btn" onclick="mergeKavels()"
                class="hidden w-full text-xs font-medium py-1.5 px-3 rounded-lg border border-emerald-300 text-emerald-600 hover:bg-emerald-50 transition-all">
              Samenvoegen tot één
            </button>
            <div id="kavels-list" class="flex flex-col gap-1.5"></div>
            <p id="kavels-empty" class="text-xs text-gray-300">Nog geen kavels geselecteerd</p>
            <div class="flex items-center justify-between text-xs text-gray-500 pt-1 border-t border-gray-100">
              <span>Totaal</span>
              <span id="opp-display" class="font-semibold text-violet-700">— m²</span>
            </div>
            <div id="kavels-pve-compat-container" class="hidden flex flex-col gap-1 pt-2 border-t border-gray-100">
              <div class="text-xs font-semibold text-gray-400 uppercase tracking-widest" style="letter-spacing:0.05em">PVE grondvlak</div>
              <div id="kavels-pve-compat-list" class="flex flex-col gap-1"></div>
            </div>
            <button onclick="overslaanKavels()" class="btn-secondary w-full">Overslaan</button>
            <button id="kavels-volgende-btn" onclick="naarTekenen()" class="btn-primary w-full" disabled>
              Volgende →
            </button>`;

        case 'tekenen':
          return `
            <button id="teken-btn" onclick="toggleTekenen()"
                class="w-full text-xs font-medium py-1.5 px-3 rounded-lg border border-violet-300 text-violet-600 hover:bg-violet-50 transition-all">
              Teken gebied
            </button>
            <div class="flex items-center justify-between text-xs text-gray-500">
              <span>Oppervlak</span>
              <span id="draw-opp-display" class="font-semibold text-violet-700">— m²</span>
            </div>
            <button id="draw-clear-btn" onclick="clearTekening()"
                class="text-xs text-gray-400 hover:text-red-500 transition-colors text-left hidden">
              ✕ Verwijder tekening
            </button>
            <div id="draw-pve-compat-container" class="hidden flex flex-col gap-1 pt-2 border-t border-gray-100">
              <div class="text-xs font-semibold text-gray-400 uppercase tracking-widest" style="letter-spacing:0.05em">PVE grondvlak</div>
              <div id="draw-pve-compat-list" class="flex flex-col gap-1"></div>
            </div>
            <div class="pt-2 border-t border-gray-100 flex flex-col gap-1.5">
              <div class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Legenda</div>
              <div class="flex items-center gap-2 text-xs" style="color:#F97316">
                <span style="display:inline-block;width:12px;height:0;border-top:2px dashed #F97316;flex-shrink:0"></span>
                <span>Onderlegger kavels</span>
              </div>
              <div class="flex items-center gap-2 text-xs" style="color:#7C3AED">
                <span style="display:inline-block;width:12px;height:2px;background:#7C3AED;opacity:0.6;flex-shrink:0;border-radius:2px"></span>
                <span>Getekend bouwvlak</span>
              </div>
            </div>
            <button onclick="overslaanTekenen()" class="btn-secondary w-full">Overslaan</button>
            <button id="tekenen-volgende-btn" onclick="naarStap2()" class="btn-primary w-full" disabled>
              Volgende stap →
            </button>`;
      }
    }

    // ── renderCards ───────────────────────────────────────────────────────────
    function renderCards() {
      const container = document.getElementById('cards-container');
      container.innerHTML = '';
      CARDS.forEach(card => {
        const isDone   = completedCards.has(card.key);
        const isActive = card.key === activeCard;
        if (isActive) {
          const div = document.createElement('div');
          div.className = 'card p-4 flex flex-col gap-3';
          div.style.border = '1.5px solid #7C3AED';
          div.innerHTML = `<h3 class="text-xs font-semibold text-gray-400 uppercase tracking-widest">${card.label}</h3>${getCardInnerHTML(card.key)}`;
          container.appendChild(div);
        } else {
          const pill = document.createElement('button');
          pill.className   = 'tab-pill ' + (isDone ? 'done' : 'pending');
          pill.textContent = (isDone ? '✓ ' : '') + card.label;
          if (isDone) pill.onclick = () => goToCard(card.key);
          container.appendChild(pill);
        }
      });
      // Post-render state sync
      if (activeCard === 'kavels')  renderKavelsList();
      if (activeCard === 'tekenen') updateDrawDisplay();
    }

    // Initial render
    renderCards();
  </script>
  <script src="js/bot.js"></script>
</body>
</html>
