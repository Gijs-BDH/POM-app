<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>POM – Kavel keuze</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link href="https://cdn.jsdelivr.net/npm/cesium@1.107/Build/Cesium/Widgets/widgets.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    #map, #map3d { height: 700px; border-radius: 0.75rem; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 p-8 gebied">

  <div class="mx-auto">
    <a href="project-overzicht.html" class="text-xs text-gray-400 hover:text-violet-600">← Project overzicht</a>
    <h1 id="project-titel" class="text-xl font-semibold text-gray-700 mt-1 mb-6"></h1>

    <div class="flex gap-6">
      <div id="nav-panel" class="nav-panel"></div>

      <!-- Map -->
      <div class="flex-1">
        <div class="flex justify-end mb-2">
          <div class="inline-flex rounded-lg border border-gray-200 bg-white p-0.5">
            <button id="btn-2d" onclick="setMapMode('2d')" class="px-3 py-1 text-xs rounded-md bg-violet-600 text-white">2D</button>
            <button id="btn-3d" onclick="setMapMode('3d')" class="px-3 py-1 text-xs rounded-md text-gray-500">3D</button>
          </div>
        </div>
        <div id="map"></div>
        <div id="map3d" class="hidden"></div>
      </div>

      <!-- Right: choice card -->
      <div class="w-80 flex-shrink-0">
        <div class="card">
          <h2 class="text-2xl font-bold text-gray-800 mb-1">Kavel selecteren</h2>
          <p class="text-sm text-gray-500 mb-6">
            Hoe wilt u de geselecteerde kavel(s) gebruiken?
          </p>

          <div class="flex flex-col gap-3">

            <button onclick="window.location.href='gebied-stap-1b-kavels.html?mode=bouwvlak'"
                    class="text-left p-5 rounded-xl border-2 border-gray-200 hover:border-violet-400 hover:bg-violet-50 transition-all group">
              <div class="flex items-start gap-4">
                <div class="w-10 h-10 rounded-full bg-violet-50 group-hover:bg-violet-100 flex items-center justify-center flex-shrink-0">
                  <svg class="w-5 h-5 text-violet-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/>
                  </svg>
                </div>
                <div>
                  <div class="font-semibold text-gray-700 text-sm">Kavel overnemen als bouwvlak</div>
                  <div class="text-xs text-gray-400 mt-1">Selecteer een of meer kavels op de kaart — de kavelgrens wordt direct als bouwvlak gebruikt</div>
                </div>
              </div>
            </button>

            <button onclick="window.location.href='gebied-stap-1b-kavels.html?mode=onderlegger'"
                    class="text-left p-5 rounded-xl border-2 border-gray-200 hover:border-orange-400 hover:bg-orange-50 transition-all group">
              <div class="flex items-start gap-4">
                <div class="w-10 h-10 rounded-full bg-orange-50 group-hover:bg-orange-100 flex items-center justify-center flex-shrink-0">
                  <svg class="w-5 h-5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                  </svg>
                </div>
                <div>
                  <div class="font-semibold text-gray-700 text-sm">Kavel gebruiken als onderlegger</div>
                  <div class="text-xs text-gray-400 mt-1">Selecteer een of meer kavels als referentie — teken daarna zelf het bouwvlak in</div>
                </div>
              </div>
            </button>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script>window.CESIUM_BASE_URL = 'https://cdn.jsdelivr.net/npm/cesium@1.107/Build/Cesium/';</script>
  <script src="https://cdn.jsdelivr.net/npm/cesium@1.107/Build/Cesium/Cesium.js"></script>
  <script src="js/cesium-maplibre-shim.js?v=20261031"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/state.js"></script>
  <script>
    const project = getCurrentProject();
    if (!project) { window.location.href = 'index.html'; }
    document.getElementById('project-titel').textContent = project.naam;
    document.getElementById('nav-panel').innerHTML = renderNavPanel('gebied', project);

    // ── Map init ─────────────────────────────────────────────────────────────
    const MAP_VIEW_KEY = 'pom_map_view_gebied_' + project.id;
    const savedView = JSON.parse(localStorage.getItem(MAP_VIEW_KEY) || 'null');
    const initCenter = savedView ? [savedView.lat, savedView.lng] : [52.2, 5.3];
    const initZoom   = savedView ? savedView.zoom : 8;

    const map = L.map('map', { zoomControl: true }).setView(initCenter, initZoom);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19
    }).addTo(map);
    map.on('moveend', () => {
      const c = map.getCenter();
      localStorage.setItem(MAP_VIEW_KEY, JSON.stringify({ lat: c.lat, lng: c.lng, zoom: map.getZoom() }));
    });

    // ── 3D map ───────────────────────────────────────────────────────────────
    const map3d = new maplibregl.Map({
      container: 'map3d',
      style: {
        version: 8,
        sources: {
          osm: {
            type: 'raster',
            tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
            tileSize: 256,
            attribution: '© OpenStreetMap contributors'
          }
        },
        layers: [{ id: 'osm', type: 'raster', source: 'osm' }]
      },
      center: [initCenter[1], initCenter[0]],
      zoom: initZoom,
      pitch: 55,
      bearing: -15
    });

    let mapMode = '2d';
    function setMapMode(mode) {
      mapMode = mode;
      const map2dEl = document.getElementById('map');
      const map3dEl = document.getElementById('map3d');
      const btn2d   = document.getElementById('btn-2d');
      const btn3d   = document.getElementById('btn-3d');

      if (mode === '3d') {
        const c = map.getCenter();
        map3d.setCenter([c.lng, c.lat]);
        map3d.setZoom(map.getZoom());
        map2dEl.classList.add('hidden');
        map3dEl.classList.remove('hidden');
        btn2d.className = 'px-3 py-1 text-xs rounded-md text-gray-500';
        btn3d.className = 'px-3 py-1 text-xs rounded-md bg-violet-600 text-white';
        map3d.resize();
        syncLeafletTo3D();
      } else {
        const c = map3d.getCenter();
        map.setView([c.lat, c.lng], map3d.getZoom());
        map3dEl.classList.add('hidden');
        map2dEl.classList.remove('hidden');
        btn2d.className = 'px-3 py-1 text-xs rounded-md bg-violet-600 text-white';
        btn3d.className = 'px-3 py-1 text-xs rounded-md text-gray-500';
        map.invalidateSize();
      }
    }
    window.setMapMode = setMapMode;

    let map3dReady = false;
    const sync3dSourceId = 'leaflet-polygons-src';
    function syncLeafletTo3D() {
      if (!map3dReady) return;
      const features = [];
      map.eachLayer(layer => {
        if (layer instanceof L.Polygon) {
          const gj = layer.toGeoJSON();
          if (gj && gj.geometry) {
            gj.properties = {
              fillColor:   layer.options?.fillColor  || layer.options?.color || '#7C3AED',
              lineColor:   layer.options?.color      || '#4C1D95',
              fillOpacity: layer.options?.fillOpacity ?? 0.22,
              lineWidth:   layer.options?.weight     ?? 1.5,
            };
            features.push(gj);
          }
        }
      });
      const fc  = { type: 'FeatureCollection', features };
      const src = map3d.getSource(sync3dSourceId);
      if (src) {
        src.setData(fc);
      } else {
        map3d.addSource(sync3dSourceId, { type: 'geojson', data: fc });
        map3d.addLayer({
          id: 'leaflet-polygons-fill', type: 'fill', source: sync3dSourceId,
          paint: {
            'fill-color':   ['coalesce', ['get', 'fillColor'],   '#7C3AED'],
            'fill-opacity': ['coalesce', ['get', 'fillOpacity'], 0.22]
          }
        });
        map3d.addLayer({
          id: 'leaflet-polygons-line', type: 'line', source: sync3dSourceId,
          paint: {
            'line-color': ['coalesce', ['get', 'lineColor'], '#4C1D95'],
            'line-width': ['coalesce', ['get', 'lineWidth'], 1.5]
          }
        });
      }
    }
    map3d.on('load', () => { map3dReady = true; syncLeafletTo3D(); });
    map.on('layeradd',    syncLeafletTo3D);
    map.on('layerremove', syncLeafletTo3D);

    // Show existing variants as context
    (project.gebiedVarianten || []).forEach(g => {
      const geo = (g.bouwbaarGebied && g.bouwbaarGebied.geo && g.bouwbaarGebied.geo.length >= 3)
                  ? g.bouwbaarGebied.geo
                  : (g.geo && g.geo.length >= 3 ? g.geo : null);
      if (geo) L.polygon(geo, { color: '#9CA3AF', fillColor: '#9CA3AF', fillOpacity: 0.15, weight: 1.5 }).addTo(map);
    });
  </script>
  <script src="js/bot.js"></script>
</body>
</html>
